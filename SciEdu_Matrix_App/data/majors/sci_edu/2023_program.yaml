program_name: 科学教育专业
program_code: '040102'
version: '2023'
training_objectives:
  description: 本专业适应国家新时代师范教育高质量发展和广东省基础教育现代化的要求，坚持学校“师范性、教学型，地方性、应用型”的办学定位，立足粤西、服务广东，培养具有高尚师德与深厚教育情怀，具备丰厚的人文、科学与艺术素养，具有科学教育理想和扎实的科学知识，突出的科学教育专业能力，能够在反思中发展，多元化育人，具有良好的沟通合作和班级管理能力，能胜任小学科学及科技教育教学的高素质小学科学教师。
  goals:
  - id: 1
    name: 师德修养
    content: 具有坚定的科学教育理想信念和爱国主义情怀，在思想和情感上认同中国特色社会主义；热爱教师职业并深刻理解其内涵，积极贯彻党的教育方针，落实立德树人为根本任务；遵守教师职业道德规范，依法执教，展现良好的师德师风，成为学生发展的引路人。
  - id: 2
    name: 专业能力
    content: 扎实掌握小学科学的基本知识、基本理论和基本实验技能；具备科学逻辑思维与基本研究方法，树立良好的科学精神、专业素养与创新意识；具有独立获取知识、实践研究与技术研发能力。系统掌握所兼教学科（如数学、综合实践活动等）的核心概念与知识体系。具备先进的科学教育教学理念，掌握探究教学、问题解决、实验操作等基本教学技能与方法，能够综合运用现代教育技术与前沿科学教学理论开展教学与教研活动。具备跨学科融合能力，能够整合数学、技术、工程等学科知识开展综合性科学探究与教学设计。具备良好的数字化素养，能运用数字技术、信息工具进行科学探究、数据分析、模拟实验及教育研究。
  - id: 3
    name: 育人能力
    content: 具备良好的沟通、管理与合作能力，能够有效引导学生全面发展。掌握小学德育的基本原理与方法，具有较强的班级组织与管理能力，能够营造积极向上的班级氛围，促进学生的社会性发展。关注学生的个体差异与身心健康，能够结合科学教育特点，在探究活动中培养学生的合作精神、责任感与科学态度，促进学生全面、健康成长。
  - id: 4
    name: 终身发展
    content: 具有终身学习理念、反思与发展意识、职业规划；具有较强的教育经验归纳与探究能力，适应新时代科学教育教学改革和发展，形成丰富的教学、教研与管理经验；关注科学教学改革发展动态，主动学习，提高自身素质，毕业五年左右，具有丰富教学经验和较高的教育智慧，成为小学科学教育教学改革的骨干教师。
graduation_requirements:
- id: 1
  name: 师德规范
  description: 理解并认同新时代中国特色社会主义思想，在科学教育中践行社会主义核心价值观；具有依法执教意识，严格遵守科学实验安全规范与科学伦理要求，遵守教师职业道德规范，提高自身师德修养，正确分析实践教学中师德规范与法律问题；贯彻党的教育方针，树立科学教育职业理想，成为具有师德认同、立德树人等新时代理念的“四有”好老师。
  indicators:
  - id: 1-1
    title: 理想信念
    content: 对中国特色社会主义具有深刻的思想与情感认同，在科学教育实践中自觉践行社会主义核心价值观。能秉承“厚德重教、为人师表”的师范精神，树立科学教育职业理想，立志成为“四有”好老师。
  - id: 1-2
    title: 立德树人
    content: 坚持育人为本、德育为先的教育理念，理解并践行“四有”好老师的核心内涵。在科学教育教学实践中实施素质教育，培养学生德智体美劳全面发展的核心素养，注重科学精神与人文精神的融合。
  - id: 1-3
    title: 依法执教
    content: 了解党的教育方针，具有依法执教意识，严格遵守科学实验安全规范与科学伦理要求。能在教育教学活动中遵守法律法规、教师职业道德规范和教师行为准则，能够正确分析和处理实践教学中的师德规范与法律问题。
- id: 2
  name: 教育情怀
  description: 具有小学科学从教意愿，认同教师工作的意义和专业性，具有积极的情感、端正的态度、正确的价值观和科学观。具有人文底蕴和科学精神，尊重学生人格，富有爱心、责任心，工作细心、耐心，在教育教学实践中注重保护并激发学生的好奇心和求知欲，做学生锤炼品格、学习知识、创新思维、奉献祖国的引路人。
  indicators:
  - id: 2-1
    title: 职业认同
    content: 具有小学科学从教意愿，认同教师工作的意义和价值，热爱教育事业。认同小学科学教育对学生发展的价值和意义，尊重学生全面而有个性地发展。
  - id: 2-2
    title: 职业素养
    content: 具有良好的人文底蕴和科学精神，能够陈述和解释社会人文历史与科学发现的历史；具备较先进的教育理念和正确的教育观，拥有良好的心理素质和健全人格，乐于为学生成长创造发展条件和机会。
  - id: 2-3
    title: 情感践行
    content: 具有积极的教育情感，情系学生、胸怀育人；工作中细心、耐心，保护学生的好奇心和求知欲；以爱心、责任心、事业心投入育人工作，做学生锤炼品格、学习知识、创新思维、奉献祖国的引路人。
- id: 3
  name: 学科素养
  description: 系统掌握小学科学及其兼教学科（如数学、综合实践活动等）的基础知识、基本原理、基本技能与方法；把握科学学科知识体系的发展历程与前沿动态，理解科学与其他学科的内在联系及其在社会生活中的实践价值。具备跨学科整合能力，能够有机融合数学、技术、工程等学科知识开展综合性科学教学与探究活动。具备良好的数字素养，了解人工智能等数字技术的基本原理，能根据教学情境科学选用技术工具提升教学实效，并主动运用数字技术发展自身教学能力。能够综合运用科学知识分析与解决学科教学中的实际问题，提升科学教学的科学性与实效性，培养学生分析和解决实际问题的能力。
  indicators:
  - id: 3-1
    title: 基础素养
    content: 掌握科学学科及兼教学科（如数学、综合实践等）的基本理论、基本知识和基本思想框架，初步具备解释科学现象的能力；掌握科学实验方法和技能，具备实验创新与设计开发的能力。
  - id: 3-2
    title: 学科思维
    content: 具备科学问题分解、逻辑推理及机制分析等学科思维，能够综合运用科学知识分析与解决学科教学中的实际问题；基于小学科学知识体系，能够培养学生的科学素养与探究能力。
  - id: 3-3
    title: 学科关联
    content: 了解科学、数学与工程等学科之间的关联，具备整合科学学科知识与教育知识的能力；了解人工智能等数字技术的基本原理，能根据教学情境科学选用技术工具提升教学实效，并主动运用数字技术发展自身教学能力。
- id: 4
  name: 教学能力
  description: 系统掌握小学科学教学的基本理论和方法，熟悉小学科学课程及其理念、小学生身心发展规律、对科学知识学习特点等；运用科学教学理论与信息技术进行教学设计、组织实施、教学评价等，具备初步教育教学能力；利用教育科学研究基本方法分析教学实际问题，并提出解决问题的思路与方法，初步具有撰写教育教学论文的基本研究能力。
  indicators:
  - id: 4-1
    title: 教学理论
    content: 掌握小学教育和科学教学的基本理论和方法，熟悉小学科学课程标准及其理念，理解小学生认知发展规律及对科学知识的学习特点。
  - id: 4-2
    title: 教学技能
    content: 掌握小学科学教学基本技能，具有运用现代教育技术与工具、教学资源等开展课堂教学设计、组织、实施和教学评价的能力，具备初步教育教学能力。
  - id: 4-3
    title: 教学研究
    content: 掌握教育科学研究的基本方法，能够分析教学实际问题并提出解决问题的思路与方法，具有从事小学科学教学研究及撰写教育教学论文的基本能力。
- id: 5
  name: 班级指导
  description: 了解小学德育工作的基本原理与方法，树立德育为先理念，根据小学生共性与个性，掌握心理辅导基本方法；通过德育工作与心理健康等活动，能够有效地解决班级活动中出现问题，帮助学生建立组织与指导班级教育活动的基本能力；了解班级常规工作管理的基本要求与基本方法，具备综合沟通交流技能，创设安全舒适的班级环境，保障学生身心健康发展。
  indicators:
  - id: 5-1
    title: 原理方法
    content: 理解班级指导在小学教育中的重要性，掌握小学德育工作的基本原理与方法，树立德育为先理念，掌握小学生心理辅导的基本方法。
  - id: 5-2
    title: 实践体验
    content: 能够运用班级指导知识，通过开展德育和心理健康教育、主题班会、家校沟通等形式，有效解决班级活动中出现的问题，具备组织与指导班级教育活动的能力，胜任班主任工作。
  - id: 5-3
    title: 班级管理
    content: 了解班级常规工作管理的基本要求与方法，掌握家长沟通合作等班级管理技能，创设安全舒适的班级环境，保障学生身心健康发展。
- id: 6
  name: 综合育人
  description: 具有教书育人的意识和责任，能够根据小学生身心发展和养成的教育规律，初步掌握科学学科育人的内容、途径与方法；在育人过程中有机融入社会主义核心价值观、中华优秀传统文化、科学精神等；了解学校文化和教育活动的育人内涵和方法，参与组织主题教育、少先队活动和社团活动，促进学生全面、健康发展。
  indicators:
  - id: 6-1
    title: 育人意识
    content: 具有教书育人的意识和责任，了解小学生身心发展、人格塑造、行为习惯养成的过程与规律，能够根据小学生身心发展和养成教育规律开展育人工作。
  - id: 6-2
    title: 育人方法
    content: 掌握科学学科育人的内容、途径与方法，在科学教学育人过程中有机融入社会主义核心价值观、中华优秀传统文化和科学精神。
  - id: 6-3
    title: 育人实践
    content: 了解学校文化和教育活动的育人内涵与方法，能够参与组织主题教育、少先队活动和社团活动，结合科学学科知识与德育课程，促进学生全面、健康发展。
- id: 7
  name: 学会反思
  description: 具备终身学习新知识、掌握新技能的意识；能够关注国内外科学基础教育教改的发展动态，根据时代教育发展需求，进行自主学习和职业生涯规划；初步掌握反思方法和技能，具有一定创新研究能力，基本学会分析和解决小学科学教育教学问题。
  indicators:
  - id: 7-1
    title: 终身学习
    content: 具备终身学习新知识、掌握新技能的意识，具备开展自主学习的能力与方法。
  - id: 7-2
    title: 规划意识
    content: 能够关注国内外科学基础教育教改的发展动态，根据时代教育发展需求，进行自主学习和职业生涯规划。
  - id: 7-3
    title: 反思能力
    content: 初步掌握反思方法和技能，具有一定创新研究能力，能够基本学会分析和解决小学科学教育教学问题。
- id: 8
  name: 沟通合作
  description: 理解学习共同体在小学科学教育教学中的重要作用，具备建立小学科学学习共同体的意识和良好的团队协作精神；系统掌握团队协作学习知识与技能，积极参加协作学习与教育活动；在教育教学实践中，能与学生、家长、同事等进行有效的沟通交流，解决教育实践中的实际问题。
  indicators:
  - id: 8-1
    title: 合作意识
    content: 理解学习共同体在小学科学教育教学中的重要作用，具有团队协作理念，懂得合作伙伴是重要的学习资源。
  - id: 8-2
    title: 团队协作
    content: 系统掌握团队协作学习知识与技能，积极主动参加协作学习与教育活动，分享协作学习成果。
  - id: 8-3
    title: 沟通协调
    content: 具有沟通交流能力，能够与学生、家长、同事等进行有效沟通，解决教育实践中的实际问题。
