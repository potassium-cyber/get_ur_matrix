# ============================================================
# 物理学专业培养方案 2019版 (适用2021级)
# ============================================================
# 数据来源: 20230327物理学专业人才培养方案（2019版）【2021级适用】.docx
# 统一 Schema 版本: v2.0
# 字段规范:
#   - training_objectives: 培养目标（含总体描述 + 分条目标点 goals）
#   - graduation_requirements: 毕业要求（含描述 + 分解指标点 indicators）
#   - 指标点 ID 格式: "X-Y"（短横线分隔）
# ============================================================

program_name: 物理学
program_code: "070201"
version: "2019"

# ============================================================
# 培养目标
# ============================================================
training_objectives:
  description: >-
    本专业坚持学校"师范性、教学型、地方性、应用型"的办学定位，立足粤西、
    服务广东，培养教育情怀深厚、师德师风高尚、物理学基础扎实、教育教学理念
    先进、掌握中学物理教学理论与实践、评价和研究的基本技能，能够在反思中发展、
    多元化发展、具有良好的沟通协作和班级管理能力，能胜任中学物理教学工作的
    高素质教师。
  goals:
    - id: 1
      name: 师德修养
      content: >-
        具有坚定的理想信念和爱国主义情怀，在思想和情感上认同中国特色社会主义，
        深刻认同和热爱教师职业，以立德树人为根本任务，依法执教，践行教师职业
        道德，成为学生发展的引路人。
    - id: 2
      name: 专业能力
      content: >-
        具备全面的中学物理教师专业素养，掌握系统扎实的物理学学科知识和专业技术
        知识及教学知识；具有先进的教育教学理念，能够依据中学物理课程标准，针对
        中学生认知规律和特点，综合运用现代教育技术和先进的物理教学理论开展教学
        和教研活动，掌握中学德育基本原则与方法，具有较强的班组管理能力，能够
        通过多元化的活动来促进学生成长。
    - id: 3
      name: 育人能力
      content: >-
        具备良好的沟通、合作能力，能够在课堂教学和主题教育等综合育人活动中教育
        和引导学生全面发展。
    - id: 4
      name: 终身发展
      content: >-
        具有较强的反思意识、职业生涯规划和终身学习并不断自我发展和完善的意识，
        具有一定的教育研究能力，能够适应新时代中学物理教育教学改革和发展，经过
        五年左右成为具有丰富教学经验和教育智慧的中学物理教育改革的骨干教师。

# ============================================================
# 毕业要求及指标点分解
# ============================================================
graduation_requirements:
  - id: 1
    name: 师德规范
    description: >-
      在思想和情感上认同中国特色社会主义，能践行社会主义核心价值观，秉承"崇德、博雅、弘志、信勇"校训，不断提高自身师德修养，立志塑造"四有"好老师。能够贯彻党的教育方针，以立德树人为己任，依法执教，在教育教学中遵守教师职业道德规范。
    indicators:
      - id: "1-1"
        title: 理想信念
        content: 能形成对中国特色社会主义的思想认同和情感认同，能够在教育教学实践中自觉践行社会主义核心价值观。能秉承"厚德重能"的精神指引，志存高远，勇于担当。
      - id: "1-2"
        title: 立德树人
        content: 能够坚持育人为本、德育为先的教育理念，理解"四有"好老师的核心内涵，并立志践行。能够在教育教学实践中实施素质教育，促进学生全面发展。
      - id: "1-3"
        title: 依法执教
        content: 了解党的教育方针，具有依法执教意识，能在教育教学活动中遵守法律法规、教师职业道德规范、教师行为准则。

  - id: 2
    name: 教育情怀
    description: >-
      具有从教意愿并能肩负国家"百年大计，教育为本"的使命，认同教师工作的价值和意义。情系学生，具有良好的人文底蕴和科学精神，尊重并重视学生人格身心健康发展，传递正确的价值观。
    indicators:
      - id: "2-1"
        title: 职业认同
        content: 认同教师工作的价值和意义，具有良好从教意愿，热爱教育事业。认同中学物理教育对学生发展的价值和意义，尊重学生全面发展。
      - id: "2-2"
        title: 职业素养
        content: 能够陈述和解释社会人文历史和科学发现的历史，具有良好的人文底蕴和科学精神，具备良好的心理素质和健全人格；具有积极向上的人生态度和正确的价值观。

  - id: 3
    name: 学科素养
    description: >-
      系统掌握物理学科的基础知识、基本原理及基本技能，理解物理学科的基本思想和方法，具备较强的物理实验探究方法和能力。理解物理与化学、生物、数学等相关学科的联系。
    indicators:
      - id: "3-1"
        title: 基础素养
        content: 掌握物理学科的基本理论、基本知识和基本思想框架，具备初步运用所学知识解释物理现象的能力；掌握普通物理实验和近代物理实验的基本技能。
      - id: "3-2"
        title: 学科思维
        content: 具备较好的问题分解、逻辑推理、数学建模及机制分析等物理学科思维，并能基于中学物理知识体系，夯实中学生的物理素养。
      - id: "3-3"
        title: 学科关联
        content: 了解物理学科与化学、生物、数学等其他学科之间的关联，基于教学论、教学法等教育学基本概论和原理，初步具备整合物理与其他学科的能力。

  - id: 4
    name: 教学能力
    description: >-
      系统掌握中学物理教学的基本理论和方法，具备中学物理教学的必备技能。能依据中学物理课程标准，针对中学生身心发展规律，综合运用物理教育理论、现代信息技术进行教学设计、组织实施、教学评价。
    indicators:
      - id: "4-1"
        title: 教学理论
        content: 掌握中学教育和物理教学的基本理论和方法，熟悉中学物理课程标准和基本理念，理解中学生在物理学习过程中的认知发展规律。
      - id: "4-2"
        title: 教学技能
        content: 掌握中学物理教学基本技能，具有运用现代教育技术与工具、教学资源等开展课堂教学设计、组织和实施能力。
      - id: "4-3"
        title: 教学研究
        content: 理解和掌握中学物理教学评价的方法，初步具备发现问题和解决问题的能力，具有从事物理教育教学研究的能力。

  - id: 5
    name: 班级指导
    description: >-
      理解德育在中学生健康发展中的关键性，掌握中学德育目标、原理、内容及方法。能够综合运用多种方法解决班级管理和教育活动中遇到的具体问题。
    indicators:
      - id: "5-1"
        title: 原理方法
        content: 理解班级指导在中学教育中的重要性，掌握班级指导目标、原理、内容和方法。掌握学生发展指导、综合素质评价、与家长沟通等相关知识。
      - id: "5-2"
        title: 指导体验
        content: 熟悉教育教学相关法律制度、校园安全和应急管理等相关规定。能够运用班级指导知识，通过开展德育和心理健康教育、主题班会等活动进行实践。

  - id: 6
    name: 综合育人
    description: >-
      具有教书育人的意识和责任。能够根据中学生身心发展和养成的教育规律，初步掌握物理学科育人的内容、途径与方法，在育人过程中有机融入社会主义核心价值观。
    indicators:
      - id: "6-1"
        title: 育人意识
        content: 了解中学生身心发展、人格塑造、行为习惯养成过程和规律。通过观察、谈话、倾听、课堂教学等途径和方法，理解中学生的发展需求。
      - id: "6-2"
        title: 育人实践
        content: 理解物理学科在综合育人方面的价值。能够结合物理学科特征和内涵，根据学情特点，将知识学习、能力发展和品德养成相结合。

  - id: 7
    name: 学会反思
    description: >-
      具备终身学习新知识、掌握新技能的意识。能够关注国内外物理基础教育教改的发展动态，根据时代教育发展需求，进行自主学习和职业生涯规划。
    indicators:
      - id: "7-1"
        title: 规划意识
        content: 有物理教育和科研等专业领域终身学习发展的意识，具备自主学习的能力，并能进行职业生涯规划，主动了解国内外物理研究和教育发展动态。
      - id: "7-2"
        title: 教育改进
        content: 初步掌握教育教学反思的基本方法和策略，能够对教育教学实践活动进行有效的自我诊断，提出改进思路。初步掌握学科研究方法。

  - id: 8
    name: 沟通合作
    description: >-
      理解学习共同体在中学物理教育教学中的重要作用，具备建立物理学习共同体的意识和良好的团队协作精神。能够与学生、家长、同事等进行有效的沟通交流。
    indicators:
      - id: "8-1"
        title: 团队协作
        content: 理解学习共同体在物理教学中的作用，具有团队协作的理念和精神。能积极投入小组合作学习和团队工作及研究活动。
      - id: "8-2"
        title: 沟通协调
        content: 具有组织管理和协调能力，能够与领导、同事、家长及学生进行有效沟通，并解决教育实践中遇到的问题。

# ============================================================
# 核心课程
# ============================================================
core_courses:
  professional:
    - 力学
    - 热学
    - 电磁学
    - 光学
    - 原子物理
    - 理论力学
    - 量子力学
    - 数学物理方法
    - 热力学与统计物理学
    - 电动力学
    - 普通物理实验
    - 近代物理实验
  teacher_education:
    - 教育学基础
    - 教育心理学
    - 现代教育技术应用
    - 中学物理教学设计
    - 物理教学技能训练（含微格教学）
    - 物理学科课程标准与教材研究
    - 中学物理实验研究
    - 中学物理教具设计与制作
    - 中学教育科研方法与实务
    - 教育实习
